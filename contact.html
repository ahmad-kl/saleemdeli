<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · Saleem Deli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet" />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ── reset & base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #faf9f7;
            color: #1e1e1e;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── header ── */
        .header {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            background-color: #faf9f7;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            transition: color 0.2s;
        }
        .site-name:hover {
            color: #666;
        }

        /* ── nav ── */
        .nav {
            display: flex;
            align-items: center;
            gap: 1.75rem;
        }

        .nav a {
            font-size: 0.9rem;
            font-weight: 400;
            color: #3a3a3a;
            transition: color 0.2s;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 1.5px;
            background-color: #1e1e1e;
            transition: width 0.25s ease;
        }

        .nav a:hover {
            color: #000;
        }
        .nav a:hover::after {
            width: 100%;
        }

        /* ── hamburger ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 20;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background-color: #1e1e1e;
            border-radius: 2px;
            transition: 0.25s ease;
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ── mobile nav ── */
        @media (max-width: 820px) {
            .hamburger {
                display: flex;
            }

            .nav {
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                max-width: 340px;
                height: 100vh;
                background-color: #faf9f7;
                flex-direction: column;
                align-items: flex-start;
                padding: 6rem 2.5rem 2.5rem 2.5rem;
                gap: 1.25rem;
                box-shadow: -8px 0 30px rgba(0, 0, 0, 0.04);
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                border-left: 1px solid rgba(0, 0, 0, 0.04);
                overflow-y: auto;
            }

            .nav.open {
                transform: translateX(0);
            }

            .nav a {
                font-size: 1.1rem;
                font-weight: 400;
                width: 100%;
                padding: 0.3rem 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            }

            .nav a::after {
                display: none;
            }

            .nav a:hover {
                padding-left: 0.5rem;
                border-bottom-color: #1e1e1e;
            }

            .backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.08);
                z-index: 5;
                backdrop-filter: blur(2px);
            }
            .backdrop.visible {
                display: block;
            }

            .header {
                padding: 1rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 1.25rem;
            }
            .site-name {
                font-size: 1.25rem;
            }
            .nav {
                max-width: 280px;
                padding: 5rem 1.75rem 1.75rem 1.75rem;
            }
        }

        /* ── CONTACT PAGE MAIN ── */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            flex: 1;
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            color: #1e1e1e;
        }

        .page-sub {
            font-size: 1.1rem;
            font-weight: 300;
            color: #5a5a5a;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 1.5rem;
        }

        /* ── CONTACT GRID ── */
        .contact-wrapper {
            display: flex;
            gap: 4rem;
            align-items: flex-start;
        }

        /* Contact Info Column */
        .contact-info {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .contact-info h3 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #1e1e1e;
            margin-bottom: 0.3rem;
        }

        .contact-info p,
        .contact-info a {
            font-size: 0.95rem;
            font-weight: 300;
            color: #5a5a5a;
            display: block;
        }

        .contact-info a:hover {
            color: #1e1e1e;
        }

        .info-item {
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 1.5rem;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.2rem;
        }

        .social-links a {
            font-size: 1.6rem;
            color: #1e1e1e;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .social-links a:hover {
            color: #888;
            transform: translateY(-3px);
        }

        /* ── CONTACT FORM ── */
        .contact-form {
            flex: 1;
            background-color: #f0efec;
            border-radius: 16px;
            padding: 2.5rem 2rem;
        }

        .contact-form h3 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #1e1e1e;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: #4a4a4a;
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: #1e1e1e;
            background-color: #faf9f7;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1e1e1e;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Submit Button */
        .submit-btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #1e1e1e;
            border: 1px solid #1e1e1e;
            border-radius: 30px;
            transition: all 0.25s ease;
            background: transparent;
            cursor: pointer;
            width: fit-content;
        }

        .submit-btn:hover {
            background-color: #1e1e1e;
            color: #faf9f7;
            transform: translateY(-1px);
        }

        /* ── FOOTER ── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 2.5rem;
            width: 100%;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 300;
            color: #8a8a8a;
            letter-spacing: 0.01em;
        }
        .footer span {
            color: #1e1e1e;
            font-weight: 400;
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .contact-wrapper {
                flex-direction: column;
                gap: 2.5rem;
            }
            .contact-info {
                flex: 1;
                width: 100%;
            }
            .contact-form {
                padding: 2rem 1.5rem;
            }
            .page-title {
                font-size: 2rem;
            }
            .main {
                padding: 2.5rem 1.5rem 1.5rem;
            }
            .footer {
                padding: 1.5rem 1.5rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 1.8rem;
            }
            .contact-form {
                padding: 1.5rem 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- ─── backdrop (mobile) ─── -->
    <div class="backdrop" id="backdrop"></div>

    <!-- ─── header ─── -->
    <header class="header">
        <a href="index.html" class="site-name">Saleem Deli</a>

        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

       <nav class="nav" id="nav">
        <a href="/">Home</a>
        <a href="/bio">Bio</a>
        <a href="/books">Books</a>
        <a href="/journals">Journals</a>
        <a href="/articles">Articles</a>
        <a href="/interviews">Interviews</a>
        <a href="/events">Events</a>
        <a href="/gallery">Gallery</a>
        <a href="/contact">Contact</a>
    </nav>
    </header>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="main">

        <h1 class="page-title">Contact</h1>
        <p class="page-sub">Let's connect — for inquiries, collaborations, or just to say hello.</p>

        <div class="contact-wrapper">

            <!-- Contact Info Section -->
            <div class="contact-info">

                <div class="info-item">
                    <h3>Email</h3>
                    <a href="mailto:seleemshafi@gmail.com">seleemshafi@gmail.com</a>
                </div>

                <!-- Location removed as requested -->

                <div class="info-item">
                    <h3>Social</h3>
                    <div class="social-links">
                        <a href="https://www.instagram.com/saleeemshafi" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="https://www.facebook.com/share/1GWpuD3oGh/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </div>

            </div>

            <!-- Contact Form Section -->
            <div class="contact-form">
                <h3>Send a message</h3>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Type Your Name" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="E-mail" required />
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send →</button>
                </form>
            </div>

        </div>

    </main>

    <!-- ─── FOOTER ─── -->
    <footer class="footer">
        <p>© <span id="year"></span> <span>Saleem Deli</span>. All rights reserved.</p>
    </footer>

    <!-- ─── script ─── -->
    <script>
        (function() {
            // Hamburger menu logic
            const hamburger = document.getElementById('hamburger');
            const nav = document.getElementById('nav');
            const backdrop = document.getElementById('backdrop');

            function toggleMenu() {
                const isOpen = nav.classList.toggle('open');
                hamburger.classList.toggle('active');
                backdrop.classList.toggle('visible');
                document.body.style.overflow = isOpen ? 'hidden' : '';
            }

            function closeMenu() {
                nav.classList.remove('open');
                hamburger.classList.remove('active');
                backdrop.classList.remove('visible');
                document.body.style.overflow = '';
            }

            hamburger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', closeMenu);

            nav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMenu();
            });

            // ── Footer Year ──
            document.getElementById('year').textContent = new Date().getFullYear();

        })();
    </script>

</body>
</html>
