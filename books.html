<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books · Saleem Deli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet" />
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf9f7;
            color: #1e1e1e;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── header ── */
        .header {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            background: #faf9f7;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            transition: color 0.2s;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1.75rem;
        }

        .nav a {
            font-size: 0.9rem;
            font-weight: 400;
            color: #3a3a3a;
            transition: color 0.2s;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 1.5px;
            background: #1e1e1e;
            transition: width 0.25s ease;
        }

        .nav a:hover {
            color: #000;
        }
        .nav a:hover::after {
            width: 100%;
        }

        /* ── hamburger ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 20;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background: #1e1e1e;
            border-radius: 2px;
            transition: 0.25s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ── mobile nav ── */
        @media (max-width: 820px) {
            .hamburger {
                display: flex;
            }

            .nav {
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                max-width: 340px;
                height: 100vh;
                background: #faf9f7;
                flex-direction: column;
                align-items: flex-start;
                padding: 6rem 2.5rem 2.5rem 2.5rem;
                gap: 1.25rem;
                box-shadow: -8px 0 30px rgba(0, 0, 0, 0.04);
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                border-left: 1px solid rgba(0, 0, 0, 0.04);
                overflow-y: auto;
            }

            .nav.open {
                transform: translateX(0);
            }

            .nav a {
                font-size: 1.1rem;
                font-weight: 400;
                width: 100%;
                padding: 0.3rem 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            }

            .nav a::after {
                display: none;
            }

            .backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.08);
                z-index: 5;
                backdrop-filter: blur(2px);
            }
            .backdrop.visible {
                display: block;
            }

            .header {
                padding: 1rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .site-name {
                font-size: 1.25rem;
            }
            .nav {
                max-width: 280px;
                padding: 5rem 1.75rem 1.75rem 1.75rem;
            }
        }

        /* ── main ── */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            flex: 1;
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            color: #1e1e1e;
        }

        .page-sub {
            font-size: 1.1rem;
            font-weight: 300;
            color: #5a5a5a;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 1.5rem;
        }

        .books-scroll-wrapper {
            position: relative;
        }

        .books-scroll-container {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding-bottom: 2rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .books-scroll-container::-webkit-scrollbar {
            height: 4px;
        }
        .books-scroll-container::-webkit-scrollbar-track {
            background: #e8e6e1;
            border-radius: 10px;
        }
        .books-scroll-container::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }
        .books-scroll-container::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        .book-card {
            flex: 0 0 280px;
            scroll-snap-align: start;
            background: #f0efec;
            border-radius: 16px;
            padding: 1.8rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: background-color 0.25s, transform 0.2s;
            border: 1px solid transparent;
        }

        .book-card:hover {
            background: #e8e6e1;
            transform: translateY(-3px);
        }

        .book-card img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            margin-bottom: 1.2rem;
        }

        .book-card h3 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #1e1e1e;
            margin-bottom: 0.3rem;
            line-height: 1.3;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .book-card .book-sub {
            font-size: 0.85rem;
            font-weight: 400;
            color: #7a7a7a;
            margin-bottom: 0.6rem;
        }

        .book-card .book-desc {
            font-size: 0.9rem;
            font-weight: 300;
            color: #5a5a5a;
            margin-bottom: 1.2rem;
            line-height: 1.4;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .book-card .book-price {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e1e1e;
            margin-bottom: 0.8rem;
        }

        .buy-btn {
            display: inline-block;
            padding: 0.5rem 1.4rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: #1e1e1e;
            border: 1px solid #1e1e1e;
            border-radius: 30px;
            transition: all 0.25s ease;
            width: fit-content;
            background: transparent;
            cursor: pointer;
            margin-top: auto;
        }

        .buy-btn:hover {
            background: #1e1e1e;
            color: #faf9f7;
            transform: translateY(-1px);
        }

        /* ── FOOTER ── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 2.5rem;
            width: 100%;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 300;
            color: #8a8a8a;
            letter-spacing: 0.01em;
        }
        .footer span {
            color: #1e1e1e;
            font-weight: 400;
        }

        @media (max-width: 720px) {
            .book-card {
                flex: 0 0 220px;
                padding: 1.2rem 1rem;
            }
            .book-card img {
                width: 110px;
                height: 160px;
            }
            .page-title {
                font-size: 2rem;
            }
            .main {
                padding: 2.5rem 1.5rem 1.5rem;
            }
            .footer {
                padding: 1.5rem 1.5rem 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- ─── backdrop (mobile) ─── -->
    <div class="backdrop" id="backdrop"></div>

    <!-- ─── header ─── -->
    <header class="header">
        <a href="index.html" class="site-name">Saleem Deli</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <nav class="nav" id="nav">
        <a href="/">Home</a>
        <a href="/bio">Bio</a>
        <a href="/books">Books</a>
        <a href="/journals">Journals</a>
        <a href="/articles">Articles</a>
        <a href="/interviews">Interviews</a>
        <a href="/events">Events</a>
        <a href="/gallery">Gallery</a>
        <a href="/contact">Contact</a>
    </nav>
    </header>

    <!-- ─── main ─── -->
    <main class="main">
        <h1 class="page-title">Books</h1>
        <p class="page-sub">A selection of published works — scroll left to right to explore.</p>
        <div class="books-scroll-wrapper">
            <div class="books-scroll-container" id="booksContainer">
                <!-- ഇവിടെ JavaScript വഴി കാർഡുകൾ വരും -->
            </div>
        </div>
    </main>

    <!-- ─── FOOTER ─── -->
    <footer class="footer">
        <p>© <span id="year"></span> <span>Saleem Deli</span>. All rights reserved.</p>
    </footer>

    <!-- ─── Firebase SDK (CDN) ─── -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>

    <script>
        // ── Hamburger Logic ──
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('nav');
        const backdrop = document.getElementById('backdrop');

        hamburger.addEventListener('click', () => {
            nav.classList.toggle('open');
            hamburger.classList.toggle('active');
            backdrop.classList.toggle('visible');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
        });

        backdrop.addEventListener('click', () => {
            nav.classList.remove('open');
            hamburger.classList.remove('active');
            backdrop.classList.remove('visible');
            document.body.style.overflow = '';
        });

        nav.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('open');
                hamburger.classList.remove('active');
                backdrop.classList.remove('visible');
                document.body.style.overflow = '';
            });
        });

        // ── FIREBASE CONFIG ──
        const firebaseConfig = {
            apiKey: "AIzaSyANtBgdTdRm3KTprwVDTl-ZEXmJBhpD6-0",
            authDomain: "saleemdeli-65e3f.firebaseapp.com",
            projectId: "saleemdeli-65e3f",
            storageBucket: "saleemdeli-65e3f.firebasestorage.app",
            messagingSenderId: "749131046750",
            appId: "1:749131046750:web:3a82ae0527291e608279cf",
            measurementId: "G-MY03REM2PP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ── LOAD BOOKS FROM FIRESTORE ──
        async function loadBooks() {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';
            try {
                const querySnapshot = await db.collection('books').orderBy('timestamp', 'desc').get();
                if (querySnapshot.empty) {
                    container.innerHTML = "<p style='color:#5a5a5a; text-align:center; padding:2rem;'>No books added yet.</p>";
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    let priceHtml = '';
                    if (data.price && data.price.trim() !== '') {
                        priceHtml = `<div class="book-price">${data.price}</div>`;
                    }
                    card.innerHTML = `
                            <img src="${data.image}" alt="${data.title}" />
                            <h3>${data.title}</h3>
                            <div class="book-sub">${data.sub || ''}</div>
                            <p class="book-desc">${data.desc || ''}</p>
                            ${priceHtml}
                            <a href="${data.link}" target="_blank" class="buy-btn">Buy Now →</a>
                        `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading books: ", error);
                container.innerHTML =
                    "<p style='color:#c62828; text-align:center; padding:2rem;'>Error loading data. Please check Firebase connection.</p>";
            }
        }
        loadBooks();

        // ── Footer Year ──
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
