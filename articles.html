<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Articles · Saleem Deli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet"/>
    <style>
        /* ── RESET & BASE ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf9f7;
            color: #1e1e1e;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── HEADER ── */
        .header {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            background: #faf9f7;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .site-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            transition: color 0.2s;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1.75rem;
        }

        .nav a {
            font-size: 0.9rem;
            font-weight: 400;
            color: #3a3a3a;
            transition: color 0.2s;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 1.5px;
            background: #1e1e1e;
            transition: width 0.25s ease;
        }

        .nav a:hover {
            color: #000;
        }
        .nav a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 20;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background: #1e1e1e;
            border-radius: 2px;
            transition: 0.25s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media(max-width:820px) {
            .hamburger {
                display: flex;
            }
            .nav {
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                max-width: 340px;
                height: 100vh;
                background: #faf9f7;
                flex-direction: column;
                align-items: flex-start;
                padding: 6rem 2.5rem 2.5rem 2.5rem;
                gap: 1.25rem;
                box-shadow: -8px 0 30px rgba(0, 0, 0, 0.04);
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                border-left: 1px solid rgba(0, 0, 0, 0.04);
                overflow-y: auto;
            }
            .nav.open {
                transform: translateX(0);
            }
            .nav a {
                font-size: 1.1rem;
                font-weight: 400;
                width: 100%;
                padding: 0.3rem 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            }
            .nav a::after {
                display: none;
            }
            .backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.08);
                z-index: 5;
                backdrop-filter: blur(2px);
            }
            .backdrop.visible {
                display: block;
            }
            .header {
                padding: 1rem 1.5rem;
            }
        }

        @media(max-width:480px) {
            .site-name {
                font-size: 1.25rem;
            }
            .nav {
                max-width: 280px;
                padding: 5rem 1.75rem 1.75rem 1.75rem;
            }
        }

        /* ── MAIN CONTENT ── */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            flex: 1;
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            color: #1e1e1e;
        }

        .page-sub {
            font-size: 1.1rem;
            font-weight: 300;
            color: #5a5a5a;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 1.5rem;
        }

        .scroll-wrapper {
            position: relative;
        }
        .scroll-container {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding-bottom: 2rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .scroll-container::-webkit-scrollbar {
            height: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #e8e6e1;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        /* ── CARD ── */
        .card {
            flex: 0 0 280px;
            scroll-snap-align: start;
            background: #f0efec;
            border-radius: 16px;
            padding: 1.8rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: background-color 0.25s, transform 0.2s;
            border: 1px solid transparent;
        }
        .card:hover {
            background: #e8e6e1;
            transform: translateY(-3px);
        }
        .card img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            margin-bottom: 1.2rem;
        }
        .card h3 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #1e1e1e;
            margin-bottom: 0.3rem;
            line-height: 1.3;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .card .sub {
            font-size: 0.85rem;
            font-weight: 400;
            color: #7a7a7a;
            margin-bottom: 0.6rem;
        }
        .card .desc {
            font-size: 0.9rem;
            font-weight: 300;
            color: #5a5a5a;
            margin-bottom: 1.2rem;
            line-height: 1.4;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.4rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: #1e1e1e;
            border: 1px solid #1e1e1e;
            border-radius: 30px;
            transition: all 0.25s ease;
            width: fit-content;
            background: transparent;
            cursor: pointer;
            margin-top: auto;
        }
        .btn:hover {
            background: #1e1e1e;
            color: #faf9f7;
            transform: translateY(-1px);
        }

        @media(max-width:720px) {
            .card {
                flex: 0 0 220px;
                padding: 1.2rem 1rem;
            }
            .card img {
                width: 110px;
                height: 160px;
            }
            .page-title {
                font-size: 2rem;
            }
            .main {
                padding: 2.5rem 1.5rem 1.5rem;
            }
        }

        /* ── POPUP MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #faf9f7;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            position: relative;
        }
        .modal-box .close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
        }
        .modal-box .close-btn:hover {
            color: #1e1e1e;
        }
        .modal-box h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        .modal-box .modal-sub {
            color: #7a7a7a;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            display: block;
        }
        .modal-box .modal-content {
            font-size: 1rem;
            font-weight: 300;
            color: #4a4a4a;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        @media(max-width:600px) {
            .modal-box {
                padding: 1.5rem;
            }
            .modal-box h2 {
                font-size: 1.4rem;
            }
        }

        /* ── FOOTER ── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 2.5rem;
            width: 100%;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 300;
            color: #8a8a8a;
            letter-spacing: 0.01em;
        }
        .footer span {
            color: #1e1e1e;
            font-weight: 400;
        }

        @media(max-width:720px) {
            .footer {
                padding: 1.5rem 1.5rem 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- ─── backdrop (mobile) ─── -->
    <div class="backdrop" id="backdrop"></div>

    <!-- ─── header ─── -->
    <header class="header">
        <a href="index.html" class="site-name">Saleem Deli</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <nav class="nav" id="nav">
            <a href="index.html">Home</a>
            <a href="bio.html">Bio</a>
            <a href="books.html">Books</a>
            <a href="journals.html">Journals</a>
            <a href="articles.html">Articles</a>
            <a href="interviews.html">Interviews</a>
            <a href="events.html">Events</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- ─── main ─── -->
    <main class="main">
        <h1 class="page-title">Articles</h1>
        <p class="page-sub">Essays, critical reviews, and long-form writing — with image &amp; text.</p>
        <div class="scroll-wrapper">
            <div class="scroll-container" id="container"></div>
        </div>
    </main>

    <!-- ─── POPUP MODAL ─── -->
    <div id="articleModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 id="modalTitle">Title</h2>
            <span class="modal-sub" id="modalSub">Subtitle</span>
            <div class="modal-content" id="modalContent">Loading...</div>
        </div>
    </div>

    <!-- ─── FOOTER ─── -->
    <footer class="footer">
        <p>© <span id="year"></span> <span>Saleem Deli</span>. All rights reserved.</p>
    </footer>

    <!-- ─── Firebase SDK ─── -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>

    <script>
        // ── HAMBURGER LOGIC ──
        const h = document.getElementById('hamburger'),
            n = document.getElementById('nav'),
            b = document.getElementById('backdrop');
        h.addEventListener('click', () => {
            n.classList.toggle('open');
            h.classList.toggle('active');
            b.classList.toggle('visible');
            document.body.style.overflow = n.classList.contains('open') ? 'hidden' : '';
        });
        b.addEventListener('click', () => {
            n.classList.remove('open');
            h.classList.remove('active');
            b.classList.remove('visible');
            document.body.style.overflow = '';
        });
        n.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
            n.classList.remove('open');
            h.classList.remove('active');
            b.classList.remove('visible');
            document.body.style.overflow = '';
        }));

        // ── FIREBASE CONFIG ──
        const firebaseConfig = {
            apiKey: "AIzaSyANtBgdTdRm3KTprwVDTl-ZEXmJBhpD6-0",
            authDomain: "saleemdeli-65e3f.firebaseapp.com",
            projectId: "saleemdeli-65e3f",
            storageBucket: "saleemdeli-65e3f.firebasestorage.app",
            messagingSenderId: "749131046750",
            appId: "1:749131046750:web:3a82ae0527291e608279cf",
            measurementId: "G-MY03REM2PP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ── LOAD ARTICLES ──
        async function loadArticles() {
            const container = document.getElementById('container');
            container.innerHTML =
                '<p style="color:#5a5a5a;text-align:center;padding:2rem;">⏳ Loading...</p>';
            try {
                const snap = await db.collection('articles').orderBy('timestamp', 'desc').get();
                if (snap.empty) {
                    container.innerHTML =
                        "<p style='color:#5a5a5a;text-align:center;padding:2rem;'>No articles added yet.</p>";
                    return;
                }
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                            <img src="${data.image}" alt="${data.title}" />
                            <h3>${data.title}</h3>
                            <div class="sub">${data.sub || ''}</div>
                            <p class="desc">${data.desc || ''}</p>
                            <button class="btn" onclick='openModal("${doc.id}")'>Read Full Article →</button>
                        `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                container.innerHTML =
                    "<p style='color:#c62828;text-align:center;padding:2rem;'>Error loading data.</p>";
            }
        }
        loadArticles();

        // ── MODAL FUNCTIONS ──
        async function openModal(id) {
            const modal = document.getElementById('articleModal');
            document.getElementById('modalTitle').textContent = "Loading...";
            document.getElementById('modalSub').textContent = "";
            document.getElementById('modalContent').textContent = "Please wait...";
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                const doc = await db.collection('articles').doc(id).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('modalTitle').textContent = data.title || 'Untitled';
                    document.getElementById('modalSub').textContent = data.sub || '';
                    document.getElementById('modalContent').textContent = data.content || 'No content available.';
                } else {
                    document.getElementById('modalContent').textContent = "Article not found.";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('modalContent').textContent = "Error loading content.";
            }
        }

        function closeModal() {
            document.getElementById('articleModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ── Footer Year ──
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
